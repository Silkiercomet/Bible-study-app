<!DOCTYPE html>
<!--
  SCREEN: Reset password (set a new one).
  Entered from the reset-password email link: /reset-password?token=...
  STUBS / TODO:
    - Verify token server-side BEFORE rendering. If invalid/expired/used,
      redirect to link-expired.html.
    - On submit: POST /api/auth/reset { token, new_password }.
      Server hashes (bcrypt/argon2), invalidates the reset token, clears
      login_attempts counter, and ideally invalidates other active sessions.
    - Client-side checks: minimum length (8+), both fields match,
      "show password" toggle is allowed.
    - On success -> login.html?reset=success (renders the success banner
      and clears any prior error/lockout state).
    - Mismatch is INLINE (red outline + message), self-clears on input.
      Do NOT use a pop-up for mismatch.
  Inline <style>; logo is base64 preview (see LOGO note).
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bible Dose — Reset password</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #eef0f3;
    --surface: #ffffff;
    --midnight: #1a2236;
    --midnight-soft: #4a5476;
    --midnight-mute: #8a92a8;
    --teal: #2c9d96;
    --teal-soft: rgba(44, 157, 150, 0.1);
    --teal-hover: #248a84;
    --ember: #e8693d;
    --ember-soft: rgba(232, 105, 61, 0.1);
    --ember-hover: #d85a30;
    --purple: #6b5fd4;
    --purple-soft: rgba(107, 95, 212, 0.1);
    --border: #dde1e7;
    --input-border: #ccd2db;
    --shadow: rgba(26, 34, 54, 0.06);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    font-family: 'Poppins', system-ui, sans-serif;
    background: var(--bg);
    color: var(--midnight);
    min-height: 100vh;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  .page { min-height: 100vh; display: flex; flex-direction: column; }
  .hero { background: var(--midnight); color: white; padding: 12px 16px 26px; }
  .hero-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; }
  .back { font-size: 13px; color: rgba(255,255,255,0.75); text-decoration: none; display: inline-flex; align-items: center; gap: 4px; padding: 6px 4px; font-weight: 500; min-width: 60px; }
  .hero-spacer { min-width: 60px; }
  .logo-slot { display: flex; align-items: center; gap: 9px; }
  .logo-img { height: 34px; width: auto; display: block; }
  .hero-content { text-align: center; display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .pill-badge { display: inline-block; background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.85); padding: 4px 12px; border-radius: 100px; font-size: 10px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; }
  .hero h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.01em; line-height: 1.25; }
  .hero p { font-size: 14px; color: rgba(255,255,255,0.7); max-width: 440px; }
  .content { flex: 1; padding: 26px 16px 40px; display: flex; flex-direction: column; align-items: center; }
  .footer { padding: 20px; font-size: 13px; color: var(--midnight-mute); text-align: center; display: flex; justify-content: center; gap: 24px; font-weight: 500; border-top: 1px solid var(--border); }
  .footer a { color: var(--midnight-mute); text-decoration: none; }
  .btn-primary { width: 100%; font-family: inherit; font-size: 15px; font-weight: 600; color: white; background: var(--teal); border: none; border-radius: 12px; padding: 15px; cursor: pointer; transition: background 0.15s, transform 0.1s; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .btn-primary:hover { background: var(--teal-hover); }
  .btn-primary:active { transform: scale(0.99); }
  .btn-secondary { width: 100%; font-family: inherit; font-size: 15px; font-weight: 600; color: var(--midnight); background: #fff; border: 1.5px solid var(--input-border); border-radius: 12px; padding: 14px; cursor: pointer; transition: background 0.15s, border-color 0.15s; }
  .btn-secondary:hover { background: var(--bg); border-color: var(--midnight-mute); }
  @media (min-width: 768px) {
    .hero { padding: 16px 40px 34px; }
    .hero h1 { font-size: 26px; }
    .hero p { font-size: 15px; }
    .pill-badge { font-size: 11px; padding: 5px 14px; }
    .content { padding: 44px 24px 60px; }
  }

  .auth-card { width: 100%; max-width: 420px; background: var(--surface); border-radius: 20px; padding: 28px 24px; box-shadow: 0 2px 14px var(--shadow); }
  .field-block { margin-bottom: 14px; }
  .field-label { display: block; font-size: 13px; font-weight: 600; color: var(--midnight-soft); margin-bottom: 7px; }
  .label-row { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 7px; }
  .show-link { font-size: 12px; color: var(--midnight-soft); cursor: pointer; font-weight: 500; text-decoration: underline; text-decoration-color: var(--border); text-underline-offset: 3px; background: none; border: none; padding: 0; font-family: inherit; }
  .show-link:hover { color: var(--midnight); }
  .pw-input { width: 100%; font-family: inherit; font-size: 15px; padding: 14px; border: 1.5px solid var(--input-border); border-radius: 12px; background: #fff; color: var(--midnight); }
  .pw-input::placeholder { color: var(--midnight-mute); }
  .pw-input:focus { outline: none; border-color: var(--teal); box-shadow: 0 0 0 3px var(--teal-soft); }
  .pw-input.error { border-color: #d64545; background: rgba(214, 69, 69, 0.04); }
  .pw-input.error:focus { box-shadow: 0 0 0 3px rgba(214, 69, 69, 0.18); }
  .err-msg { display: none; font-size: 12px; color: #d64545; margin-top: 6px; font-weight: 500; }
  .field-block.invalid .err-msg { display: block; }
  .rules { text-align: left; font-size: 12px; color: var(--midnight-mute); margin: 4px 0 14px; line-height: 1.6; }
  .rules .ok { color: var(--teal-hover); font-weight: 600; }
</style>
<link rel="stylesheet" href="css/style.css">
</head>

      <div class="hero-content">
        <div class="pill-badge">Reset password</div>
        <h1>Set a new password</h1>
        <p>Choose something you'll remember.</p>
      </div>
    </div>

    <div class="content">
      <div class="auth-card">
 <form id="resetForm" novalidate>
          
          <div class="field-block" id="newBlock">
            <div class="label-row">
              <label class="field-label" for="newPw">New password</label>
              <button class="show-link" id="showNew" type="button">Show</button>
            </div>
            <input class="pw-input" id="newPw" type="password" autocomplete="new-password" placeholder="At least 8 characters">
            <div class="err-msg">Password must be at least 8 characters.</div>
          </div>

          <div class="rules">
            <span id="ruleLen">○ 8+ characters</span>
          </div>

          <div class="field-block" id="confirmBlock">
            <div class="label-row">
              <label class="field-label" for="confirmPw">Confirm new password</label>
              <button class="show-link" id="showConfirm" type="button">Show</button>
            </div>
            <input class="pw-input" id="confirmPw" type="password" autocomplete="new-password" placeholder="Re-enter your new password">
            <div class="err-msg">Passwords don't match.</div>
          </div>

          <button class="btn-primary" type="submit" id="submitBtn">Update password</button>
        </form>
      </div>
    </div>
    <div class="footer">
      <a href="#">Privacy</a>
      <a href="#">Terms</a>
      <a href="#">Help</a>
    </div>

  <script src="js/reset-password-script.js"></script>
