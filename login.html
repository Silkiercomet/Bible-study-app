    <div class="content">
      <!-- Success banner: ?reset=success after password reset -->
      <div class="success-banner" id="successBanner">
        <div class="sb-ic">✓</div>
        <div class="sb-text">
          <strong>Password updated.</strong> Sign in with your new password.
        </div>
      </div>

      <div class="auth-card">
        <!-- Heading lives in the card per scope -->
        <div class="card-header">
          <h1>Welcome back</h1>
          <p>Sign in to your Bible Dose account.</p>
        </div>

        <form id="loginForm" novalidate>
          <!-- Email -->
          <div class="field-block" id="emailBlock">
            <div class="label-row">
              <label class="field-label" for="email">Email address</label>
              <a class="forgot-link" href="recover-email.html">Forgot email?</a>
            </div>
            <input class="input-field" id="email" type="email" inputmode="email"
                   autocomplete="email" placeholder="you@example.com">
            <div class="err-msg" id="emailErr">Incorrect email or password.</div>
          </div>

          <!-- Password -->
          <div class="field-block" id="passwordBlock">
            <div class="label-row">
              <label class="field-label" for="password">Password</label>
              <a class="forgot-link" href="forgot-password.html">Forgot password?</a>
            </div>
            <div class="input-wrap">
              <input class="input-field" id="password" type="password"
                     autocomplete="current-password" placeholder="••••••••">
              <button class="eye-btn" id="eyePassword" type="button" aria-label="Show password">
                <!-- Eye icon (closed by default) -->
                <svg viewBox="0 0 24 24" aria-hidden="true" id="eyePasswordIcon">
                  <path d="M1 12S5 4 12 4s11 8 11 8-4 8-11 8S1 12 1 12z"/>
                  <circle cx="12" cy="12" r="3"/>
                  <line x1="2" y1="2" x2="22" y2="22"/>
                </svg>
              </button>
            </div>
          </div>

          <!-- Submit — disabled until valid email + any password -->
          <button class="btn-primary" type="submit" id="signInBtn" disabled>
            Sign in
          </button>

          <!-- Lockout warning after 3+ failed attempts -->
          <div class="attempts-note" id="attemptsNote">
            For your security, repeated incorrect attempts may temporarily lock the account.
          </div>
        </form>

        <div class="card-foot">
          <div class="row">New here? <a href="create-account.html">Create an account</a></div>
        </div>
      </div>
    </div>

    <div class="footer">
